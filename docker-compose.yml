version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis-crypto
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-crypto
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Permite a Prometheus ver tu Spring Boot local

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-crypto
    ports:
      - "3000:3000"
    depends_on:
      - prometheus